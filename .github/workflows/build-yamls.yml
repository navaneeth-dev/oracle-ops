name: Render manifests and push to OCI
on:
  push:

env:
  OCI_REPO: "oci://ghcr.io/${{ github.actor }}/manifests/${{ github.event.repository.name }}"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: jdx/mise-action@v4
        with:
          install: true

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Setup Cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: v2.6.1 # cosign v3+ will be supported only in Flux v2.8+

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Render manifests
        run: |
          mkdir -p rendered
          cd test
          pkl eval deployment.pkl > ../rendered/deployment.yaml

      - name: Push and sign manifests
        run: |
          digest_url=$(flux push artifact \
          $OCI_REPO:$(git rev-parse --short HEAD) \
          --path="./rendered" \
          --source="$(git config --get remote.origin.url)" \
          --revision="$(git branch --show-current)@sha1:$(git rev-parse HEAD)" \
          --output=json | \
          jq -r '. | .repository + "@" + .digest')

          cosign sign --yes $digest_url          
