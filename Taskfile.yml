version: '3'

# Base tasks - all variables provided by overlay files (dev/prod)

tasks:
  bootstrap-flux:
    vars:
      CLUSTER_PATH:
        sh: |
          if [ "$TF_VAR_cluster_name" = "rizexor-oracle-dev" ]; then
            echo "rizexor-oracle-dev"
          else
            echo "oracle"
          fi
    cmds:
      - kubectl get ns flux-system || kubectl create ns flux-system
      - |
        kubectl -n flux-system get secret sops-age || kubectl create secret generic sops-age \
          --namespace=flux-system \
          --from-literal=age.agekey="$(infisical secrets get TF_VAR_SOPS_AGEKEY --env=prod --projectId=201b912b-40de-44bf-bb83-ab1bc77554b7 --plain)"
      - |
        infisical run --env=prod --projectId=201b912b-40de-44bf-bb83-ab1bc77554b7 -- flux bootstrap github \
          --owner=navaneeth-dev \
          --repository=oracle-ops \
          --branch=main \
          --personal \
          --path=k8s/clusters/{{.CLUSTER_PATH}}

  genconfig:
    desc: Generate Talos configuration
    cmds:
      - sops -d secrets.sops.yaml > secrets.yaml
      - |
        talosctl gen config $TF_VAR_cluster_name https://{{.LB_IP}}:6443 \
          --with-secrets secrets.yaml \
          --kubernetes-version {{.KUBERNETES_VERSION}} \
          --talos-version {{.TALOS_VERSION}} \
          --config-patch @patches/cert-approver.yaml \
          --config-patch @patches/oracle-ntp.yaml \
          --config-patch @patches/hostdns.yaml \
          --config-patch @patches/topolvm.yaml \
          --config-patch @patches/scheduling.yaml \
          --config-patch @patches/cilium.yaml \
          --config-patch @multidoc/volume.yaml \
          --config-patch-control-plane @patches/monitoring.yaml \
          --additional-sans {{.LB_IP}} --force
      - talosctl config endpoint {{.LB_IP}}
      - rm secrets.yaml

  reboot:
    desc: Reboot Talos node
    cmds:
      - talosctl reboot -n {{.NODE_IP}}

  applyconfig:
    desc: Apply Talos configuration
    cmds:
      - talosctl apply-config -f controlplane.yaml -n {{.NODE_IP}} -e {{.LB_IP}}
      - rm controlplane.yaml worker.yaml

  bootstrap:
    desc: Bootstrap Talos cluster
    cmds:
      - talosctl bootstrap -n {{.LB_IP}} -e {{.LB_IP}}

  kubeconfig:
    desc: Get kubeconfig
    cmds:
      - echo {{.NODE_IP}} {{.LB_IP}}
      - talosctl kubeconfig ./kubeconfig --nodes {{.NODE_IP}}

  cilium-install:
    desc: Generate Cilium installation manifest (for documentation)
    cmds:
      - |
        helm template \
          cilium \
          cilium/cilium \
          --version 1.18.0 \
          --namespace kube-system \
          --set ipam.mode=kubernetes \
          --set kubeProxyReplacement=false \
          --set securityContext.capabilities.ciliumAgent="{CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}" \
          --set securityContext.capabilities.cleanCiliumState="{NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}" \
          --set cgroup.autoMount.enabled=false \
          --set cgroup.hostRoot=/sys/fs/cgroup \
          --set envoy.enabled=false \
          --set operator.replicas=1 > .cilium.yaml
