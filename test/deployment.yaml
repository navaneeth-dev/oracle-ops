apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      name: backstage
      labels:
        app: backstage
    spec:
      containers:
        - name: backstage
          image: ghcr.io/navaneeth-dev/backstage:v0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7007
              protocol: TCP
      restartPolicy: Always
