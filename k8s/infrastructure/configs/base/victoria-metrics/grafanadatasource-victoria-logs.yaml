apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoria-logs
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: VictoriaLogs
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victoria-logs-server.observability:9428
    isDefault: true
  plugins:
    - name: victoriametrics-logs-datasource
      # renovate: datasource=github-releases packageName=VictoriaMetrics/victorialogs-datasource
      version: 0.26.3
