apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  # Victoria Metrics dev secrets
  - dev-secrets/victoria-metrics-alertmanager.yaml
  - dev-secrets/victoria-metrics-discord-webhook.yaml

patches:
  # Temporarily disable authentik
  - patch: |-
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: authentik
        namespace: flux-system
    target:
      kind: Kustomization
      name: authentik
      namespace: flux-system
