# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name sonarr
  namespace: homelab
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      sonarr:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: 4.0.17.2967@sha256:4ff5667a371e08b098858fa2457a99a5fef5f6a32640eb8567efe979d13ac9fc
            env:
              SONARR__UPDATE__BRANCH: develop
              TZ: "${TZ}"
            envFrom:
              - secretRef:
                  name: sonarr-ovh-upload-secrets
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 8989
                  initialDelaySeconds: 80
                  periodSeconds: 10
                  timeoutSeconds: 15
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ "ALL" ] }
            resources:
              limits:
                memory: 2Gi
              requests:
                cpu: 100m
                memory: 100Mi

    service:
      app:
        primary: true
        controller: *name
        ports:
          http:
            port: *port

#    route:
#      main:
#        enabled: true
#        kind: HTTPRoute
#        parentRefs:
#          - kind: Gateway
#            name: reverse-proxy
#            namespace: envoy-gateway-system
#        hostnames:
#          - 'sonarr.${DOMAIN}'
#        rules:
#          - backendRefs:
#              - group: ""
#                kind: Service
#                name: sonarr
#                port: *port
#                weight: 1
#            matches:
#              - path:
#                  type: PathPrefix
#                  value: /
#            timeouts:
#              request:  "180s"

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: data
        globalMounts:
          - path: /data
      scripts:
        type: configMap
        name: sonarr-ovh-upload-script
        defaultMode: 493
        globalMounts:
          - path: /config/scripts/sonarr-ovh-upload.sh
            subPath: sonarr-ovh-upload.sh
            readOnly: true
      tmp:
        type: emptyDir
