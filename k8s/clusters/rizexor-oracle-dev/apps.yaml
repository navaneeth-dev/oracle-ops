apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/apps/oracle-rizexor-dev
  prune: false
  # disable wait because of pvc WaitForConsumer
  wait: false
  timeout: 15m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          decryption:
            provider: sops
            secretRef:
              name: sops-age
          deletionPolicy: WaitForTermination
          postBuild:
            substituteFrom:
              - kind: ConfigMap
                name: variables
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
    - patch: |-
        - op: add
          path: /spec/components/-
          value: ../../../../../components/volsync-dev
      target:
        group: kustomize.toolkit.fluxcd.io
        version: v1
        kind: Kustomization
        namespace: flux-system
        name: ^(seerr|bazarr|recyclarr|audiobookshelf|qbittorrent|jellyfin|prowlarr|sabnzbd|sonarr|radarr)$
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: variables
